<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CeMoQu – Ataxia Diagnostic Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/header.css">
    <script src="../shared/header.js" defer></script>

    <style>
        :root {
            --bg: #020617;
            --panel: #02091b;
            --panel-soft: #020b21;
            --accent: #203fdb;
            --accent-soft: rgba(16, 185, 129, 0.16);
            --muted: #94a3b8;
            --muted-soft: #1f2937;
            --text: #e5e7eb;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #020b21 0, #020617 45%, #000 100%);
            color: var(--text);
        }

        body {
            display: flex;
            justify-content: center;
            padding: 16px;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            padding-top: 130px; /* Space for the modular header */
        }

        .shell {
            width: 100%;
            max-width: 800px;
            border-radius: 24px;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.92));
            border: 1px solid #111827;
            padding: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Matches index2.html topbar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--muted-soft);
            padding-bottom: 20px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.02em;
            background: linear-gradient(to right, #fff, var(--muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .small-muted {
            font-size: 14px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Button styles matched to index2.html */
        .btn-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #21c1fb);
            color: #020617;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.08s ease;
        }

        .btn-pill:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--muted-soft);
            color: var(--text);
        }

        /* Form styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--muted-soft);
            background: rgba(2, 9, 27, 0.5);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div id="header-container"></div>

    <div class="shell">
        <header class="topbar">
            <div class="title-block">
                <h1>CeMoQu</h1>
                <div class="small-muted">Ataxia Diagnostic Suite – Participant Metadata</div>
            </div>
            <div class="header-actions">
                <button class="btn-pill btn-outline" id="clear-btn">Clear Form</button>
            </div>
        </header>

        <form id="metadata-form">
            <div class="form-grid">
                <div class="field-group">
                    <label for="participant-id">Participant ID</label>
                    <input type="text" id="participant-id" placeholder="e.g. P-101">
                </div>
                <div class="field-group">
                    <label for="session-id">Session ID</label>
                    <input type="text" id="session-id" readonly>
                </div>
                <div class="field-group">
                    <label for="date">Assessment Date</label>
                    <input type="date" id="date">
                </div>
                <div class="field-group">
                    <label for="assessor">Assessor Name</label>
                    <input type="text" id="assessor" placeholder="Dr. Smith">
                </div>
            </div>

            <div class="field-group" style="margin-top: 20px;">
                <label for="notes">Clinical Notes</label>
                <textarea id="notes" rows="3" placeholder="Additional observations..."></textarea>
            </div>

            <div class="actions">
                <button type="button" class="btn-pill" id="save-btn">Save & Continue</button>
            </div>
        </form>
    </div>

    <script>
        (function () {
            const sessionField = document.getElementById('session-id');
            const saveBtn = document.getElementById('save-btn');
            const clearBtn = document.getElementById('clear-btn');

            function generateSessionId() {
                return 'SESS-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            }

            // Set default date and session
            document.getElementById('date').valueAsDate = new Date();
            sessionField.value = generateSessionId();

            saveBtn.addEventListener('click', () => {
                const data = {
                    participantId: document.getElementById('participant-id').value,
                    sessionId: sessionField.value,
                    date: document.getElementById('date').value,
                    notes: document.getElementById('notes').value
                };
                console.log("Metadata Saved:", data);
                // In a real app, you might save to localStorage or redirect:
                // window.location.href = "index2.html";
            });

            clearBtn.addEventListener('click', () => {
                document.getElementById('metadata-form').reset();
                sessionField.value = generateSessionId();
            });
        })();
    </script>
</body>

</html>
