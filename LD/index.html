<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Line Drawing Test – CeMoQu</title>

<link rel="stylesheet" href="StyleSheetHolder.css">
<link rel="stylesheet" href="../shared/header.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="../shared/header.js" defer></script>

</head>


<body>

<div id="header-container"></div>

<div class="shell">

<header>
<h1>Line Drawing Test</h1>
</header>

<div id="main">

<section class="card">
<div id="canvas-container">
<canvas id="testCanvas" width="1000" height="500"></canvas>
</div>
</section>

<aside id="sidebar">

<div>Time: <span id="timer">0.00</span> s</div>

<table>
<thead>
<tr>
<th>Metric</th>
<th>Value</th>
<th>Mode</th>
</tr>
</thead>

<tbody>

<tr>
<td>Discontinuities</td>
<td id="discontValue">0</td>
<td>—</td>
</tr>

<tr>
<td>Turns (Vertical)</td>
<td id="verticalTurnValue">0</td>
<td>—</td>
</tr>

<tr>
<td>Reverses (Horizontal)</td>
<td id="horizontalTurnValue">0</td>
<td>—</td>
</tr>

<tr>
<td>Off-by</td>
<td id="offByValue">0</td>
<td>
<input type="number" id="offByThreshold" value="10">
</td>
</tr>

<tr>
<td>Deviation Area</td>
<td id="deviationValue">0</td>
<td>
<button onclick="toggleDeviationMode()">Total</button>
</td>
</tr>

<tr>
<td>Turn Avg</td>
<td id="turnValue">0</td>
<td>
<button onclick="toggleTurnMode()">Avg Vertical</button>
</td>
</tr>

<tr>
<td>Out-of-Bounds</td>
<td id="outOfBoundsValue">0</td>
<td>—</td>
</tr>

<tr>
<td>Start Fails</td>
<td id="startFailsValue">0</td>
<td>—</td>
</tr>

</tbody>
</table>

</aside>
</div>

<div class="bottom-controls">

<select id="testSelector" onchange="changeTest()">
<option value="vertical">Vertical Test</option>
<option value="horizontal">Horizontal Test</option>
<option value="diagonal1">Diagonal Test 1</option>
<option value="diagonal2">Diagonal Test 2</option>
</select>

<button onclick="stopTest()">Stop Test</button>
<button onclick="resetTest()">Reset Test</button>
<button onclick="exportData()">Export Data</button>

</div>

</div>

<script>
const canvas=document.getElementById("testCanvas");
const ctx=canvas.getContext("2d");
const WIDTH=1000, HEIGHT=500, BOX=50;

let currentTest=null;
let startBox, finishBox;

let active=false, drawing=false, success=false;
let startHit=false, finishHit=false;

let touches=[];
let statistics={discontinuities:0,verticalTurns:0,horizontalTurns:0,deviationArea:0,outOfBounds:0,startFails:0};

let deviationMode="total", turnMode="avgVertical";
let dx=0,dy=0,timerId=0;

const tests={
horizontal:{position:()=>[[40,HEIGHT/2-BOX/2],[WIDTH-40-BOX,HEIGHT/2-BOX/2]]},
vertical:{position:()=>[[WIDTH/2-BOX/2,40],[WIDTH/2-BOX/2,HEIGHT-40-BOX]]},
diagonal1:{position:()=>[[40,40],[WIDTH-40-BOX,HEIGHT-40-BOX]]},
diagonal2:{position:()=>[[40,HEIGHT-40-BOX],[WIDTH-40-BOX,40]]}
};

function drawBox(x,y,label,activeColor){
ctx.fillStyle = activeColor ? "#16a34a" : "#dc2626";
ctx.fillRect(x,y,BOX,BOX);
ctx.fillStyle="#fff";
ctx.font="bold 24px Inter";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(label,x+BOX/2,y+BOX/2);
}

function drawReference(){
ctx.strokeStyle="#334155";
ctx.beginPath();
ctx.moveTo(startBox[0]+BOX/2,startBox[1]+BOX/2);
ctx.lineTo(finishBox[0]+BOX/2,finishBox[1]+BOX/2);
ctx.stroke();
}

function redraw(clear=true){
if(clear) ctx.clearRect(0,0,WIDTH,HEIGHT);
drawReference();
drawBox(startBox[0],startBox[1],"S",startHit);
drawBox(finishBox[0],finishBox[1],"F",finishHit);
}

function getCoords(e){
const r=canvas.getBoundingClientRect();
const scaleX=canvas.width/r.width;
const scaleY=canvas.height/r.height;
return[(e.clientX-r.left)*scaleX,(e.clientY-r.top)*scaleY];
}

function isInside(x,y,box){
return x>=box[0]&&x<=box[0]+BOX&&y>=box[1]&&y<=box[1]+BOX;
}

function calcDeviation([x,y]){
const sx=startBox[0]+BOX/2, sy=startBox[1]+BOX/2;
const ex=finishBox[0]+BOX/2, ey=finishBox[1]+BOX/2;

if(sx!==ex){
const m=(ey-sy)/(ex-sx);
const a=-m,b=1,c=-sy+m*sx;
return Math.abs(a*x+b*y+c)/Math.sqrt(a*a+b*b);
}
return Math.abs(x-sx);
}

function normalize(v){return v>0?1:v<0?-1:0;}

function resetStats(){
statistics={discontinuities:0,verticalTurns:0,horizontalTurns:0,deviationArea:0,outOfBounds:0,startFails:0};
dx=0;dy=0;
}

function resetTest(){
if(!currentTest)return;

[startBox,finishBox]=currentTest.position();

active=drawing=success=false;
startHit=finishHit=false;
touches=[];

resetStats();
redraw();
updateStats();

stopTimer();
document.getElementById("timer").innerText="0.00";
}

function startTimer(){
const start=Date.now();

clearInterval(timerId);

timerId=setInterval(()=>{
document.getElementById("timer").innerText=((Date.now()-start)/1000).toFixed(2);
},10);
}

function stopTimer(){
clearInterval(timerId);
}

function changeTest(){
currentTest=tests[document.getElementById("testSelector").value];
resetTest();
}

changeTest();
</script>

</body>
</html>
